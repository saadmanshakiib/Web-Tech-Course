<html>
    <head>
        <title>Student Form</title>
        <script src="Validate.js"></script>
    </head>

    <body>
        
        <div class="form-div">
            <form onsubmit="return Validate()">
            <h1>AIUB Admission Form</h1>
        <label for="fname">First Name : </label>
        <input 
        type="text"
        id="fname"
        name="fname"
        placeholder="Enter Your First Name"><br><br>

        <label for="lname">Last Name : </label>
        <input 
        type="text"
        id="lname"
        name="lname"
        placeholder="Enter Your Last Name"><br><br>

        <label for="gender">Gender : </label>
        <input 
        type="radio"
        id="male"
        name="gender">Male

        <!-- <label for="gender">Gender</label> -->
        <input 
        type="radio"
        id="female"
        name="gender">Female <br><br>

        <label for="applying-for">Applying For  : </label>
            <input 
            id="hns"
            name="applying-for"
            type="checkbox">Honours

            <input 
            id="ms"
            name="applying-for"
            type="checkbox">Masters

            <input 
            id="phd"
            name="applying-for"
            type="checkbox">Phd <br><br>

            <label for="hsc-passing-year">Hsc Passing Year : </label>
            <select id="hsc-passing-year">
                <option id="passing-year1" value="2020">2020</option>
                <option id="passing-year2" value="2021">2021</option>
                <option id="passing-year3" value="2022">2022</option>
                <option id="passing-year4" value="2023">2023</option>
                <option id="passing-year5" value="2024">2024</option>
                <option id="passing-year6" value="2025">2025</option>
            </select>
                <br><br>
            <label for="dept">Choose Your Department : </label>
            <select id="dept">
                <option id="cse" value="cse">CSE</option>
                <option id="eee" value="eee">EEE</option>
                <option id="ipe" value="ipe">IPE</option>
                <option id="ds" value="ds">DATA SCIENCE</option>
                <option id="cncs" value="cncs">CYBER SECUIRTY</option>
                <option id="bba" value="bba">BBA</option>
                <option id="eng" value="eng">ENGLISH</option>
                <option id="mmc" value="mmc">MMC</option>

            </select>
                <br><br>
            <button id="submit-btn" type="submit">Submit</button>
        </form>
        </div>

    </body>

</html>
